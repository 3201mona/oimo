<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>守って収穫サツマイモ☆テンガで天下穫り！</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #201409;
    color: #fff4dd;
    font-family: system-ui, sans-serif;
    overscroll-behavior: none;
    touch-action: none;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  #wrap {
    width: min(980px, 100vw);
    padding: 8px;
  }

  h1 {
    margin: 4px 0 8px;
    font-size: clamp(20px, 4.8vw, 34px);
    text-align: center;
  }

  #gameBox {
    position: relative;
    border: 4px solid #6b4727;
    border-radius: 16px;
    overflow: hidden;
    background: #7b4a25;
  }

  canvas {
    display: block;
    width: 100%;
    aspect-ratio: 16 / 10;
    background: #87522a;
    cursor: crosshair;
  }

  #controls {
    display: grid;
    grid-template-columns: minmax(150px, auto) 1fr minmax(120px, auto);
    gap: 16px;
    padding: 10px;
    background: #2b190c;
    align-items: center;
  }

  #controls > div {
    grid-column: 2;
  }

  #sprayButton {
    grid-column: 1;
    min-width: 150px;
  }

  #restartButton {
    grid-column: 3;
    min-width: 120px;
  }

  #priorityBar {
    height: 38px;
    position: relative;
    overflow: hidden;
    border-top: 2px solid #6b4727;
    border-bottom: 2px solid #6b4727;
    background: #0b2f68;
  }

  #priorityBar::before {
    content: "";
    position: absolute;
    inset: 0;
    opacity: .85;
    background: repeating-linear-gradient(
      -55deg,
      var(--stripe-a) 0px,
      var(--stripe-a) 14px,
      var(--stripe-b) 14px,
      var(--stripe-b) 28px
    );
  }

  #priorityBar::after {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--overlay-color);
  }

  #priorityText {
    position: relative;
    z-index: 1;
    white-space: nowrap;
    line-height: 34px;
    font-size: 20px;
    font-weight: 900;
    color: var(--text-color);
    text-shadow:
      2px 2px 0 var(--stroke-color),
      -1px -1px 0 var(--stroke-color),
      0 0 7px rgba(255,255,255,.28);
    will-change: transform;
  }

  #priorityBar.priority-normal {
    --stripe-a: #2b88ff;
    --stripe-b: #0b2f68;
    --overlay-color: rgba(20, 70, 150, .38);
    --text-color: #eaf6ff;
    --stroke-color: rgba(0, 35, 85, .95);
  }

  #priorityBar.priority-yellow {
    --stripe-a: #ffd400;
    --stripe-b: #2a2a2a;
    --overlay-color: rgba(170, 140, 0, .35);
    --text-color: #fffbe0;
    --stroke-color: rgba(95, 75, 0, .95);
  }

  #priorityBar.priority-orange {
    --stripe-a: #ff9f1a;
    --stripe-b: #2a1a00;
    --overlay-color: rgba(180, 75, 0, .38);
    --text-color: #fff4e2;
    --stroke-color: rgba(115, 45, 0, .95);
  }

  #priorityBar.priority-red {
    --stripe-a: #ff3d3d;
    --stripe-b: #2a0000;
    --overlay-color: rgba(130, 0, 0, .45);
    --text-color: #fff3e8;
    --stroke-color: rgba(85, 0, 0, .98);
  }

  button {
    border: 0;
    border-radius: 12px;
    padding: 12px 16px;
    background: #f5c45f;
    color: #241307;
    font-size: 16px;
    font-weight: 800;
    box-shadow: inset 0 -3px 0 rgba(0,0,0,.18);
  }

  button:active { transform: translateY(1px); }

  #sprayButton {
    background: #9cff8f;
    color: #143106;
    box-shadow:
      0 0 0 3px rgba(156,255,143,.18),
      0 0 20px rgba(156,255,143,.35),
      inset 0 -3px 0 rgba(0,0,0,.18);
  }

  #sprayButton.ready { animation: sprayBtnPulse .55s infinite alternate; }

  @keyframes sprayBtnPulse {
    from {
      transform: scale(1);
      filter: brightness(1);
      box-shadow:
        0 0 0 3px rgba(156,255,143,.18),
        0 0 12px rgba(156,255,143,.25),
        inset 0 -3px 0 rgba(0,0,0,.18);
    }
    to {
      transform: scale(1.08);
      filter: brightness(1.12);
      box-shadow:
        0 0 0 5px rgba(156,255,143,.28),
        0 0 26px rgba(156,255,143,.6),
        inset 0 -3px 0 rgba(0,0,0,.18);
    }
  }

  #barOuter {
    height: 15px;
    border: 1px solid #c29a62;
    border-radius: 999px;
    background: #4b2b16;
    overflow: hidden;
  }

  #barInner {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #59b36b, #e9cc57, #e46a44);
  }

  #overlay {
    position: absolute;
    inset: 0 0 58px 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(20, 10, 3, 0.78);
    text-align: center;
    padding: 20px;
    z-index: 10;
  }

  #card {
    background: #fff4d8;
    color: #2a1709;
    border-radius: 20px;
    padding: 22px;
    max-width: 620px;
    box-shadow: 0 10px 40px rgba(0,0,0,.4);
  }

  #card h2 { margin-top: 0; font-size: 28px; }
  #card p { line-height: 1.6; }

  #sprayNotice {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 8;
    display: none;
  }

  #sprayNotice.show { display: block; }

  #sprayNoticeText {
    position: absolute;
    left: 50%;
    top: 46%;
    transform: translate(-50%, -50%);
    font-size: clamp(28px, 6vw, 56px);
    font-weight: 900;
    color: #f5fff1;
    text-shadow:
      0 0 8px rgba(255,255,255,.9),
      0 0 18px rgba(156,255,143,.9),
      0 0 34px rgba(156,255,143,.8),
      3px 3px 0 rgba(0,0,0,.28);
    opacity: 0;
  }

  #sprayNotice.show #sprayNoticeText { animation: spraySummon 1.2s ease-out forwards; }

  @keyframes spraySummon {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(.6); filter: brightness(1); }
    18% { opacity: 1; transform: translate(-50%, -50%) scale(1.35); filter: brightness(1.7); }
    38% { opacity: 1; transform: translate(-50%, -50%) scale(1.18); filter: brightness(1.45); }
    100% { opacity: 0; transform: translate(280px, 225px) scale(.18); filter: brightness(1.1); }
  }

  #sprayFlash {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at center,
        rgba(255,255,255,.95) 0%,
        rgba(196,255,183,.85) 18%,
        rgba(196,255,183,.25) 40%,
        rgba(196,255,183,0) 70%);
    opacity: 0;
  }

  #sprayNotice.show #sprayFlash { animation: sprayFlashAnim .8s ease-out forwards; }

  @keyframes sprayFlashAnim {
    0% { opacity: 0; }
    12% { opacity: .95; }
    50% { opacity: .35; }
    100% { opacity: 0; }
  }

  .hidden { display: none !important; }

  @media (max-width: 640px) {
    #controls { grid-template-columns: 1fr; }
    #overlay { inset: 0 0 166px 0; }
    button { width: 100%; font-size: 18px; padding: 14px; }

    @keyframes spraySummon {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.6); }
      18% { opacity: 1; transform: translate(-50%, -50%) scale(1.25); }
      100% { opacity: 0; transform: translate(0px, 270px) scale(.22); }
    }
  }
</style>
</head>

<body>
<div id="wrap">
  <h1>🍠 守って収穫サツマイモ☆テンガで天下穫り！</h1>

  <div id="gameBox">
    <canvas id="game" width="960" height="600"></canvas>

    <div id="sprayNotice">
      <div id="sprayFlash"></div>
      <div id="sprayNoticeText">消毒散布可能！</div>
    </div>

    <div id="overlay"></div>

    <div id="priorityBar" class="priority-normal">
      <div id="priorityText">◎ 収穫チャンス　芋を掘りつつ害虫を処理しよう　</div>
    </div>

    <div id="controls">
      <div>
        <div style="display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px;">
          <span>畑の元気</span>
          <span id="healthText">100%</span>
        </div>
        <div id="barOuter"><div id="barInner"></div></div>
      </div>

      <button id="sprayButton" class="hidden">🌫️ 消毒散布！</button>
      <button id="restartButton">最初から</button>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const overlay = document.getElementById("overlay");
  const sprayNotice = document.getElementById("sprayNotice");
  const sprayButton = document.getElementById("sprayButton");
  const restartButton = document.getElementById("restartButton");
  const priorityBar = document.getElementById("priorityBar");
  const priorityText = document.getElementById("priorityText");
  const healthText = document.getElementById("healthText");
  const barInner = document.getElementById("barInner");

  const W = canvas.width;
  const H = canvas.height;
  const HUD = 78;
  const FIELD_BOTTOM = H - 24;
  const GAME_TIME = 120;

  const bugs = [
    { name: "芋虫", mark: "🐛", speed: 22, damage: 14, size: 42, type: "caterpillar" },
    { name: "ダニ", mark: "●", speed: 90, damage: 2, size: 10, type: "mite" },
    { name: "アブラムシ", mark: "🪲", speed: 40, damage: 0, size: 24, type: "aphid" }
  ];

  let state;
  let lastTime = performance.now();
  let pointer = { x: W / 2, y: H / 2 };

  function rand(min, max) { return min + Math.random() * (max - min); }
  function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }

  function aphidCount() {
    return state.enemies.filter(e => e.kind.type === "aphid").length;
  }

  function potatoLimit() {
    const a = aphidCount();
    if (a === 0) return 8;
    if (a === 1) return 6;
    if (a === 2) return 4;
    return 2;
  }

  function potatoSpawnInterval(aphids) {
    if (aphids === 0) return rand(0.2, 0.5);
    if (aphids === 1) return rand(0.3, 1.2);
    return rand(0.9, 2.4);
  }

  function difficultyStage() {
    if (state.time < 10) return 0;
    return 1 + Math.floor((state.time - 10) / 7);
  }

  function enemySpawnInterval(stage) {
    if (stage === 0) return rand(1.20, 1.95);
    // 7秒ごとの難易度上昇を少し強める。後半ほど害虫の出現間隔が短くなる。
    return Math.max(0.42, rand(0.82, 1.38) - stage * 0.038);
  }

  function movementDifficulty(stage) {
    // 出現率だけでなく移動速度もわずかに難化。
    return 1 + stage * 0.038;
  }

  function updateSprayButton() {
    if (state.sprayAvailable) {
      sprayButton.classList.remove("hidden");
      sprayButton.classList.add("ready");
    } else {
      sprayButton.classList.add("hidden");
      sprayButton.classList.remove("ready");
    }
  }

  function showSprayNotice() {
    sprayNotice.classList.remove("show");
    void sprayNotice.offsetWidth;
    sprayNotice.classList.add("show");
    setTimeout(() => { sprayNotice.classList.remove("show"); }, 1250);
  }

  function showStartOverlay() {
    overlay.classList.remove("hidden");
    overlay.innerHTML = `
      <div id="card">
        <h2>サツマイモ畑を守れ！</h2>
        <p>
          芋づるの株をクリックするとサツマイモを収穫。<br>
          芋虫・ダニ・アブラムシはテンガで退治。
        </p>
        <p>
          芋虫は遅いが被害大。ダニは速いが被害小。<br>
          アブラムシは直接ダメージなし、ただし芋の発生数を激減させます。
        </p>
        <p>
          台風は最優先。<br>
          難度5、10、15…で消毒散布チャンス！
        </p>
        <button id="startButton">ゲーム開始</button>
      </div>
    `;
    document.getElementById("startButton").onclick = startGame;
  }

  function newGame() {
    state = {
      running: false,
      time: 0,
      score: 0,
      kills: 0,
      health: 100,
      potatoes: [],
      enemies: [],
      particles: [],
      swing: null,
      potatoTimer: rand(1.9, 3.2),
      enemyTimer: 0,
      aphidEffectTimer: 1.0,
      typhoonTimer: 16 + Math.random() * 12,
      typhoon: null,
      sprayAvailable: false,
      sprayAwardedStage: 0,
      caterpillarOutbreak: false,
      outbreakAwardedStage: 0,
      noBugTimer: 0,
      sprayEffect: null,
      message: "準備よし",
      high: Number(localStorage.getItem("imoHighScoreTenga") || 0)
    };

    for (let i = 0; i < 5; i++) spawnPotato();
    updateSprayButton();
    showStartOverlay();
  }

  function startGame() {
    state.running = true;
    state.time = 0;
    state.message = "収穫開始！";
    overlay.classList.add("hidden");
  }

  function endGame(title) {
    state.running = false;

    if (state.score > state.high) {
      state.high = state.score;
      localStorage.setItem("imoHighScoreTenga", String(state.high));
    }

    overlay.classList.remove("hidden");
    overlay.innerHTML = `
      <div id="card">
        <h2>${title}</h2>
        <p style="font-size:24px; font-weight:900;">収穫：${state.score} 本</p>
        <p>害虫退治：${state.kills} 匹</p>
        <p>最高記録：${state.high} 本</p>
        <p style="font-size:13px; opacity:.8;">
          アブラムシを放置すると芋が出なくなり、台風を放置すると畑が一気に削られます。
        </p>
        <button id="againButton">もう一回</button>
      </div>
    `;
    document.getElementById("againButton").onclick = () => {
      newGame();
      startGame();
    };
  }

  function spawnPotato() {
    state.potatoes.push({
      x: rand(65, W - 65),
      y: rand(HUD + 50, FIELD_BOTTOM - 35),
      size: rand(24, 36),
      age: rand(0, 5),
      rot: rand(-0.6, 0.6)
    });
  }

  function spawnEnemy(forceType) {
    let kind;
    if (forceType === "caterpillar") {
      kind = bugs.find(b => b.type === "caterpillar");
    } else if (state.caterpillarOutbreak && Math.random() < 0.85) {
      // 異常発生中は芋虫の出現比率を大きく上げる。通常比で約3倍を狙う。
      kind = bugs.find(b => b.type === "caterpillar");
    } else {
      kind = bugs[Math.floor(Math.random() * bugs.length)];
    }
    const side = Math.floor(Math.random() * 4);

    let x, y;
    if (side === 0) { x = -35; y = rand(HUD, FIELD_BOTTOM); }
    else if (side === 1) { x = W + 35; y = rand(HUD, FIELD_BOTTOM); }
    else if (side === 2) { x = rand(0, W); y = HUD - 35; }
    else { x = rand(0, W); y = H + 35; }

    state.enemies.push({
      x, y, kind,
      wiggle: rand(0, Math.PI * 2),
      feedCooldown: 0,
      sprayed: false
    });
  }

  function startTyphoon() {
    const hp = 12 + Math.floor(state.time / 22);
    state.typhoon = { x: W / 2, y: H / 2, hp, maxHp: hp, life: 8.0, angle: 0, rushPulse: 0 };
    state.message = "台風発生中。台風の目を連打して勢力を弱めよう！";
  }

  function triggerSprayEvent(stage) {
    state.sprayAvailable = true;
    state.sprayAwardedStage = stage;
    state.message = `難度${stage}到達！ 消毒散布チャンス！`;
    updateSprayButton();
    showSprayNotice();
  }

  function triggerCaterpillarOutbreak(stage) {
    state.caterpillarOutbreak = true;
    state.outbreakAwardedStage = stage;
    state.message = `難度${stage}：芋虫異常発生！`;
    addParticle(W / 2, H / 2, "芋虫異常発生！", "#ffb15e", 28);
    for (let i = 0; i < 3; i++) spawnEnemy("caterpillar");
  }

  function addParticle(x, y, text, color = "#ffe68a", count = 8) {
    if (text) {
      state.particles.push({ x, y, text, color, life: 0.85, vx: 0, vy: -45, size: 23 });
    }

    for (let i = 0; i < count; i++) {
      state.particles.push({ x, y, color, life: rand(0.3, 0.75), vx: rand(-95, 95), vy: rand(-120, 40), r: rand(2, 5) });
    }
  }

  function addBurst(x, y, color = "#d9ffce") {
    for (let i = 0; i < 22; i++) {
      state.particles.push({ x, y, color, life: rand(0.35, 0.85), vx: rand(-180, 180), vy: rand(-180, 140), r: rand(2, 6) });
    }
  }

  function getPoint(event) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (event.clientX - rect.left) * W / rect.width,
      y: (event.clientY - rect.top) * H / rect.height
    };
  }

  function useTengaAt(x, y) {
    if (!state.running) return;

    pointer = { x, y };
    state.swing = { x, y, angle: rand(-0.9, 0.9), life: 0.18 };

    if (state.typhoon) {
      const d = Math.hypot(x - state.typhoon.x, y - state.typhoon.y);
      if (d < 185) {
        state.typhoon.hp--;
        addParticle(x, y, "ガツッ", "#c8f5ff", 7);

        if (state.typhoon.hp <= 0) {
          addParticle(W / 2, H / 2, "台風撃退！", "#bdf7ff", 38);
          state.typhoon = null;
          state.typhoonTimer = 22 + Math.random() * 18;
          state.message = "台風をテンガで吹き飛ばした！";
        }
      }
      return;
    }

    let nearestEnemy = null;
    let enemyDistance = Infinity;

    for (const e of state.enemies) {
      const d = Math.hypot(e.x - x, e.y - y);
      if (d < enemyDistance) { enemyDistance = d; nearestEnemy = e; }
    }

    if (nearestEnemy && enemyDistance < 56) {
      state.kills++;
      const word = nearestEnemy.kind.type === "aphid" ? "吸汁阻止！" : "退治！";
      addParticle(nearestEnemy.x, nearestEnemy.y, word, "#fff07a", 14);
      addBurst(nearestEnemy.x, nearestEnemy.y, "#ffe68a");
      state.enemies = state.enemies.filter(e => e !== nearestEnemy);
      return;
    }

    let nearestPotato = null;
    let potatoDistance = Infinity;

    for (const p of state.potatoes) {
      const d = Math.hypot(p.x - x, p.y - y);
      if (d < potatoDistance) { potatoDistance = d; nearestPotato = p; }
    }

    if (nearestPotato && potatoDistance < 55) {
      state.score++;
      addParticle(nearestPotato.x, nearestPotato.y, "+1 🍠", "#ffca68", 15);
      state.potatoes = state.potatoes.filter(p => p !== nearestPotato);
      return;
    }

    addParticle(x, y, "スカッ", "#ddd0bf", 2);
  }

  function useSpray() {
    if (!state.running || !state.sprayAvailable || state.sprayEffect) return;

    state.sprayAvailable = false;
    state.caterpillarOutbreak = false;
    updateSprayButton();
    state.sprayEffect = { frontX: -200, width: 260, speed: 780 };
    state.noBugTimer = 5.0;
    state.enemyTimer = 5.0;
    state.message = "消毒散布！ 霧が畑を流れる！";
    addParticle(W / 2, H / 2, "消毒散布！", "#b9ff9b", 36);
  }

  function nearestPotato(enemy) {
    if (state.potatoes.length === 0) return { x: W / 2, y: H / 2 };

    let best = state.potatoes[0];
    let bestD = Infinity;
    for (const p of state.potatoes) {
      const d = Math.hypot(enemy.x - p.x, enemy.y - p.y);
      if (d < bestD) { bestD = d; best = p; }
    }
    return best;
  }

  function updateSprayEffect(dt) {
    if (!state.sprayEffect) return;

    state.sprayEffect.frontX += state.sprayEffect.speed * dt;
    const backX = state.sprayEffect.frontX - state.sprayEffect.width;

    const survivors = [];
    for (const e of state.enemies) {
      if (!e.sprayed && e.x >= backX && e.x <= state.sprayEffect.frontX) {
        e.sprayed = true;
        state.kills++;
        addParticle(e.x, e.y, "消毒！", "#dffff0", 8);
        addBurst(e.x, e.y, "#d7ffd0");
      } else {
        survivors.push(e);
      }
    }
    state.enemies = survivors;

    if (backX > W + 40) {
      state.sprayEffect = null;
      state.message = "消毒完了！ しばらく害虫発生停止！";
    }
  }

  function update(dt) {
    if (!state.running) return;

    state.time += dt;
    if (state.time >= GAME_TIME) { endGame("収穫完了！"); return; }
    if (state.health <= 0) { endGame("畑がやられた……"); return; }

    const stage = difficultyStage();
    const difficulty = movementDifficulty(stage);
    const aphids = aphidCount();
    const maxPotatoes = potatoLimit();

    if (stage > 0 && stage % 5 === 4 && state.outbreakAwardedStage !== stage) {
      triggerCaterpillarOutbreak(stage);
    }

    if (stage > 0 && stage % 5 === 0 && state.sprayAwardedStage !== stage && !state.sprayAvailable && !state.sprayEffect) {
      triggerSprayEvent(stage);
    }

    if (state.noBugTimer > 0) {
      state.noBugTimer -= dt;
      if (state.noBugTimer <= 0) {
        state.noBugTimer = 0;
        state.message = "消毒効果終了。害虫が戻ってくる！";
      }
    }

    if (state.potatoes.length >= maxPotatoes) {
      // 上限いっぱいの間はタイマーを止める。
      // 空きができた瞬間に即補充されないよう、空きができてから改めてカウントを始める。
      state.potatoTimer = null;
    } else {
      if (state.potatoTimer === null || state.potatoTimer === undefined) {
        state.potatoTimer = potatoSpawnInterval(aphids);
      } else {
        state.potatoTimer -= dt;
        if (state.potatoTimer <= 0) {
          spawnPotato();
          state.potatoTimer = potatoSpawnInterval(aphids);
        }
      }
    }

    state.aphidEffectTimer -= dt;
    if (aphids > 0 && state.aphidEffectTimer <= 0) {
      state.aphidEffectTimer = Math.max(0.45, 1.2 - aphids * 0.12);
      if (state.potatoes.length > maxPotatoes) {
        const victim = state.potatoes[Math.floor(Math.random() * state.potatoes.length)];
        state.potatoes = state.potatoes.filter(p => p !== victim);
        addParticle(victim.x, victim.y, "しおれた", "#b9d27a", 5);
        state.message = "アブラムシで芋の出が悪い！";
      }
    }

    state.enemyTimer -= dt;
    if (state.enemyTimer <= 0 && !state.typhoon && state.noBugTimer <= 0) {
      spawnEnemy();
      state.enemyTimer = enemySpawnInterval(stage);
    }

    state.typhoonTimer -= dt;
    if (state.typhoonTimer <= 0 && !state.typhoon) startTyphoon();

    for (const p of state.potatoes) p.age += dt;

    for (const e of state.enemies) {
      const target = nearestPotato(e);
      const dx = target.x - e.x;
      const dy = target.y - e.y;
      const len = Math.hypot(dx, dy) || 1;

      e.wiggle += dt * 7;
      e.feedCooldown -= dt;

      const speed = e.kind.speed * difficulty;
      e.x += (dx / len) * speed * dt + Math.sin(e.wiggle) * 10 * dt;
      e.y += (dy / len) * speed * dt + Math.cos(e.wiggle) * 8 * dt;

      if (Math.hypot(e.x - target.x, e.y - target.y) < 22 && e.feedCooldown <= 0) {
        if (e.kind.type === "aphid") {
          e.feedCooldown = 1.2;
          addParticle(target.x, target.y, "吸汁", "#d5f28b", 4);
          state.message = "アブラムシ発生中：芋のポップ数低下";
        } else {
          state.health -= e.kind.damage;
          addParticle(target.x, target.y, "-" + e.kind.damage, "#ff8d73", 8);
          state.potatoes = state.potatoes.filter(p => p !== target);
          e.x += rand(-45, 45);
          e.y += rand(-45, 45);
        }
      }
    }

    if (state.typhoon) {
      state.typhoon.life -= dt;
      state.typhoon.angle += dt * 4.3;
      state.typhoon.rushPulse += dt * 12;
      state.health -= dt * 1.6;

      if (state.typhoon.life <= 0) {
        state.health -= 24;
        addParticle(W / 2, H / 2, "暴風大被害！", "#c8f5ff", 34);
        state.typhoon = null;
        state.typhoonTimer = 24 + Math.random() * 16;
        state.message = "台風の大被害を受けた！";
      }
    }

    updateSprayEffect(dt);

    if (state.swing) {
      state.swing.life -= dt;
      if (state.swing.life <= 0) state.swing = null;
    }

    for (const p of state.particles) {
      p.life -= dt;
      p.x += (p.vx || 0) * dt;
      p.y += (p.vy || 0) * dt;
      if (p.vy !== undefined) p.vy += 120 * dt;
    }

    state.particles = state.particles.filter(p => p.life > 0);
    state.health = clamp(state.health, 0, 100);
  }

  function drawSoil() {
    ctx.fillStyle = "#885028";
    ctx.fillRect(0, HUD, W, H - HUD);

    for (let y = HUD + 20; y < H; y += 44) {
      ctx.beginPath();
      ctx.strokeStyle = "rgba(60, 31, 13, .35)";
      ctx.lineWidth = 8;
      ctx.moveTo(0, y);
      for (let x = 0; x <= W; x += 40) ctx.lineTo(x, y + Math.sin(x * 0.025 + y * 0.02) * 7);
      ctx.stroke();
    }

    for (let i = 0; i < 70; i++) {
      const x = (i * 137) % W;
      const y = HUD + ((i * 91) % (H - HUD));
      ctx.fillStyle = "rgba(45, 22, 8, .25)";
      ctx.beginPath();
      ctx.arc(x, y, 2 + (i % 4), 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawHeartLeaf(x, y, s, angle) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.scale(s, s);
    ctx.fillStyle = "#3f9f42";
    ctx.strokeStyle = "#2e6e2d";
    ctx.lineWidth = 1.1;
    ctx.beginPath();
    ctx.moveTo(0, 9);
    ctx.bezierCurveTo(-13, 1, -13, -12, -2, -8);
    ctx.bezierCurveTo(0, -14, 12, -13, 12, -1);
    ctx.bezierCurveTo(12, 6, 4, 10, 0, 9);
    ctx.fill();
    ctx.stroke();
    ctx.strokeStyle = "rgba(230,255,210,.65)";
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(0, 8);
    ctx.lineTo(0, -6);
    ctx.stroke();
    ctx.restore();
  }

  function drawPotato(p) {
    const pulse = Math.sin(p.age * 3) * 1.2;
    const sway = Math.sin(p.age * 2.2) * 2.5;

    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);

    ctx.fillStyle = "rgba(68, 36, 16, .38)";
    ctx.beginPath();
    ctx.ellipse(0, 11, p.size * 1.2, p.size * 0.42, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "#8d3451";
    ctx.lineWidth = 4;
    ctx.lineCap = "round";

    ctx.beginPath();
    ctx.moveTo(-26, 3);
    ctx.bezierCurveTo(-12, -9 + sway, 18, -13, 36, -3 + pulse);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(-20, 8);
    ctx.bezierCurveTo(-5, 18, 18, 15 + sway, 31, 24);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(14, -4);
    ctx.bezierCurveTo(4, 9, -14, 14, -32, 20 + pulse);
    ctx.stroke();

    drawHeartLeaf(-29, -2, 0.72, -0.35);
    drawHeartLeaf(-7, -13, 0.82, 0.15);
    drawHeartLeaf(18, -12, 0.78, 0.45);
    drawHeartLeaf(35, -1, 0.70, -0.15);
    drawHeartLeaf(-24, 20, 0.62, 0.35);
    drawHeartLeaf(22, 23, 0.60, -0.55);

    ctx.fillStyle = "#b65a33";
    ctx.beginPath();
    ctx.ellipse(0, 14, p.size * 0.45, p.size * 0.16, 0.15, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawEnemy(e) {
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    if (e.kind.type === "mite") {
      ctx.fillStyle = "#d64035";
      ctx.beginPath();
      ctx.arc(0, 0, e.kind.size / 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#2b0000";
      ctx.fillRect(-1.5, -1.5, 3, 3);
    } else {
      ctx.font = e.kind.size + "px serif";
      ctx.fillText(e.kind.mark, 0, 0);
    }

    ctx.fillStyle = "#fff5d9";
    ctx.font = "11px sans-serif";
    ctx.fillText(e.kind.name, 0, e.kind.size + 4);
    ctx.restore();
  }

  function getPriorityAlert() {
    const aphids = aphidCount();

    if (state.typhoon) {
      return {
        level: "red",
        msg: "⚠ 台風発生中　台風の目を連打して勢力を弱めよう　"
      };
    }

    if (aphids >= 3) {
      return {
        level: "orange",
        msg: "▲ アブラムシ3匹以上　優先して退治！　"
      };
    }

    if (aphids === 2) {
      return {
        level: "orange",
        msg: "▲ アブラムシ2匹　優先して退治！　"
      };
    }

    if (aphids === 1) {
      return {
        level: "yellow",
        msg: "● アブラムシ発生　早めに退治！　"
      };
    }

    if (state.caterpillarOutbreak) {
      return {
        level: "red",
        msg: "⚠ 芋虫異常発生中　消毒散布まで踏ん張ろう　"
      };
    }

    return {
      level: "normal",
      msg: "◎ 収穫チャンス　芋を掘りつつ害虫を処理しよう　"
    };
  }

  function drawPriorityBanner() {
    const alert = getPriorityAlert();
    priorityBar.className = `priority-${alert.level}`;

    const msg = alert.msg.repeat(8);
    if (priorityText.dataset.msg !== msg) {
      priorityText.dataset.msg = msg;
      priorityText.textContent = msg;
    }

    let speed = 18;
    if (alert.level === "yellow") speed = 20;
    if (alert.level === "orange") speed = 22;
    if (alert.level === "red") speed = 24;

    const w = Math.max(1, priorityText.scrollWidth / 2);
    const offset = -((state.time * speed) % w);
    priorityText.style.transform = `translateX(${offset}px)`;
  }

  function drawTyphoon() {
    const t = state.typhoon;
    if (!t) return;

    ctx.save();

    const sky = ctx.createRadialGradient(t.x, t.y, 30, t.x, t.y, 360);
    sky.addColorStop(0, "rgba(20, 80, 110, .18)");
    sky.addColorStop(0.38, "rgba(120, 190, 215, .28)");
    sky.addColorStop(1, "rgba(25, 70, 90, .30)");
    ctx.fillStyle = sky;
    ctx.fillRect(0, HUD, W, H - HUD);

    ctx.translate(t.x, t.y);
    ctx.rotate(t.angle * 0.75);

    for (let arm = 0; arm < 5; arm++) {
      ctx.rotate((Math.PI * 2) / 5);
      for (let i = 0; i < 16; i++) {
        const r = 34 + i * 15;
        const start = 0.18 + i * 0.055;
        const end = start + 1.25 + i * 0.015;
        ctx.beginPath();
        ctx.strokeStyle = `rgba(245, 250, 255, ${0.12 + i * 0.012})`;
        ctx.lineWidth = Math.max(5, 19 - i * 0.55);
        ctx.arc(0, 0, r + Math.sin(t.rushPulse + i) * 3, start, end);
        ctx.stroke();
      }
    }

    for (let i = 0; i < 95; i++) {
      const ang = i * 2.399 + t.angle * 0.4;
      const r = 38 + (i * 23 % 285);
      const spiral = ang + r * 0.012;
      const x = Math.cos(spiral) * r;
      const y = Math.sin(spiral) * r * 0.72;
      const size = 4 + (i % 7) * 2.2;
      ctx.beginPath();
      ctx.fillStyle = `rgba(250, 252, 255, ${0.12 + (i % 5) * 0.035})`;
      ctx.ellipse(x, y, size * 1.7, size, spiral, 0, Math.PI * 2);
      ctx.fill();
    }

    const eye = ctx.createRadialGradient(0, 0, 2, 0, 0, 48);
    eye.addColorStop(0, "rgba(20, 42, 55, .95)");
    eye.addColorStop(0.32, "rgba(32, 80, 105, .82)");
    eye.addColorStop(0.55, "rgba(235, 250, 255, .62)");
    eye.addColorStop(1, "rgba(235, 250, 255, 0)");
    ctx.fillStyle = eye;
    ctx.beginPath();
    ctx.arc(0, 0, 55 + Math.sin(t.rushPulse) * 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "rgba(255,255,255,.95)";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(0, 0, 37 + Math.sin(t.rushPulse) * 2, 0, Math.PI * 2);
    ctx.stroke();

    ctx.strokeStyle = "rgba(255, 60, 60, .9)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, 70 + Math.sin(t.rushPulse * 1.4) * 5, 0, Math.PI * 2);
    ctx.stroke();

    ctx.restore();


    ctx.save();
    ctx.fillStyle = "rgba(255,255,255,.35)";
    ctx.fillRect(W / 2 - 150, HUD + 26, 300, 22);
    ctx.fillStyle = "#ff4242";
    ctx.fillRect(W / 2 - 150, HUD + 26, 300 * (t.hp / t.maxHp), 22);
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 2;
    ctx.strokeRect(W / 2 - 150, HUD + 26, 300, 22);
    ctx.fillStyle = "#fff";
    ctx.font = "bold 16px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("台風のHP", W / 2, HUD + 43);
    ctx.restore();
  }

  function drawTengaSwing() {
    const s = state.swing;
    if (!s) return;

    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.angle);
    ctx.globalAlpha = Math.max(0, s.life / 0.18);

    ctx.strokeStyle = "#d7b27a";
    ctx.lineWidth = 9;
    ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(-58, 46);
    ctx.lineTo(22, -34);
    ctx.stroke();

    ctx.fillStyle = "#222";
    ctx.strokeStyle = "#111";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(19, -39);
    ctx.lineTo(61, -46);
    ctx.lineTo(69, -23);
    ctx.lineTo(25, -13);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    ctx.strokeStyle = "#e8e8e8";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(28, -16);
    ctx.lineTo(68, -25);
    ctx.stroke();

    ctx.strokeStyle = "rgba(255,255,255,.9)";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(10, 0, 54, -0.8, 0.45);
    ctx.stroke();
    ctx.restore();
  }

  function drawSprayEffect() {
    if (!state.sprayEffect) return;

    const frontX = state.sprayEffect.frontX;
    const backX = frontX - state.sprayEffect.width;

    ctx.save();
    const grad = ctx.createLinearGradient(backX, 0, frontX, 0);
    grad.addColorStop(0, "rgba(210,255,220,0)");
    grad.addColorStop(0.25, "rgba(210,255,220,.16)");
    grad.addColorStop(0.55, "rgba(225,255,235,.34)");
    grad.addColorStop(1, "rgba(245,255,250,.52)");

    ctx.fillStyle = grad;
    ctx.fillRect(backX, HUD, state.sprayEffect.width, H - HUD);

    for (let i = 0; i < 20; i++) {
      const px = backX + (i / 20) * state.sprayEffect.width + Math.sin((frontX + i * 13) * 0.04) * 10;
      const py = HUD + 20 + (i * 37 % (H - HUD - 40));
      const r = 14 + (i % 5) * 5;
      ctx.beginPath();
      ctx.fillStyle = `rgba(245,255,250,${0.10 + (i % 4) * 0.04})`;
      ctx.arc(px, py, r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawParticles() {
    for (const p of state.particles) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.life);
      if (p.text) {
        ctx.fillStyle = p.color;
        ctx.font = `bold ${p.size || 20}px sans-serif`;
        ctx.textAlign = "center";
        ctx.fillText(p.text, p.x, p.y);
      } else {
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r || 3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  function drawHUD() {
    const left = Math.max(0, Math.ceil(GAME_TIME - state.time));
    const aphids = aphidCount();
    const stage = difficultyStage();

    ctx.fillStyle = "#2c190b";
    ctx.fillRect(0, 0, W, HUD);

    ctx.fillStyle = "#fff4dd";
    ctx.font = "bold 25px sans-serif";
    ctx.textAlign = "left";
    ctx.fillText(`🍠 収穫 ${state.score} 本`, 20, 32);
    ctx.fillText(`⛏️ 退治 ${state.kills} 匹`, 230, 32);

    ctx.textAlign = "right";
    ctx.fillText(`⏱ ${left} 秒  難度${stage}`, W - 20, 32);


    ctx.textAlign = "right";
    ctx.fillText(`最高記録 ${state.high} 本`, W - 20, 62);

    healthText.textContent = Math.round(state.health) + "%";
    barInner.style.width = state.health + "%";
  }

  function draw() {
    drawSoil();
    for (const p of state.potatoes) drawPotato(p);
    drawSprayEffect();
    for (const e of state.enemies) drawEnemy(e);
    drawTyphoon();
    drawTengaSwing();
    drawParticles();
    drawHUD();
    drawPriorityBanner();
  }

  function loop(now) {
    const dt = Math.min(0.033, (now - lastTime) / 1000);
    lastTime = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  canvas.addEventListener("pointermove", ev => { pointer = getPoint(ev); });
  canvas.addEventListener("pointerdown", ev => {
    ev.preventDefault();
    const p = getPoint(ev);
    useTengaAt(p.x, p.y);
  });

  sprayButton.onclick = useSpray;
  restartButton.onclick = () => { newGame(); };

  newGame();
  requestAnimationFrame(loop);
})();
</script>
